<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>لوحة التحكم - أكاديمية مكتب فني</title>
    <style>
        :root {
            --bg-primary:      #07090f;
            --bg-secondary:    #0c1020;
            --bg-card:         rgba(14, 20, 38, 0.88);
            --glass-border:    rgba(255, 255, 255, 0.07);
            --gold:            #c9963a;
            --gold-light:      #f0c76a;
            --blue:            #3b7ef5;
            --text-primary:    #edf2ff;
            --text-secondary:  #7a92b8;
            --radius-card:     22px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse 40% 55% at 55% 50%, rgba(14, 20, 38, 0.6) 0%, transparent 80%);
        }
        .navbar {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: rgba(7, 9, 15, 0.75);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .admin-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .admin-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-card);
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .admin-card h2 {
            margin-bottom: 24px;
            font-size: 22px;
            color: var(--gold-light);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
        }
        .form-control {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 150, 58, 0.15);
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            color: #07090f;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 150, 58, 0.3);
        }
        .btn-outline {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: transparent;
            color: var(--gold-light);
            border: 1px solid var(--gold-light);
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .btn-outline:hover {
            background: rgba(201, 150, 58, 0.1);
            transform: translateY(-2px);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 16px;
            text-align: right;
            border-bottom: 1px solid var(--glass-border);
            font-size: 15px;
        }
        th {
            color: var(--text-secondary);
            font-weight: 700;
        }
        .btn-danger {
            background: rgba(235, 87, 87, 0.1);
            color: #eb5757;
            border: 1px solid rgba(235, 87, 87, 0.3);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-danger:hover {
            background: #eb5757;
            color: #fff;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--gold-light);
            color: #000;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(201,150,58,0.4);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .hidden {
            display: none !important;
        }
        #login-view {
            max-width: 450px;
            margin: 80px auto;
            padding: 0 20px;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-title"><i class="fa-solid fa-gear"></i> لوحة الإدارة - أكاديمية مكتب فني</div>
        <div style="display: flex; gap: 12px;">
            <button id="logout-btn" class="btn-outline hidden" style="color: #eb5757; border-color: rgba(235, 87, 87, 0.4);"><i class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج</button>
            <a href="index.html" class="btn-outline"><i class="fa-solid fa-globe"></i> عرض الموقع</a>
        </div>
    </nav>

    <!-- ─────────── LOGIN VIEW ─────────── -->
    <div id="login-view" class="hidden">
        <div class="admin-card">
            <h2 style="justify-content: center; margin-bottom: 30px;"><i class="fa-solid fa-lock"></i> تسجيل الدخول</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="admin-email">البريد الإلكتروني:</label>
                    <input type="email" id="admin-email" class="form-control" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label for="admin-password">كلمة المرور:</label>
                    <input type="password" id="admin-password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> دخول
                </button>
            </form>
        </div>
    </div>

    <!-- ─────────── DASHBOARD VIEW ─────────── -->
    <div class="admin-container hidden" id="dashboard-view">
        
        <div class="admin-card">
            <h2><i class="fa-brands fa-google-drive"></i> رابط Drive الرئيسي للأعمال</h2>
            <form id="master-form">
                <div class="form-group">
                    <label for="master-link">أدخل الرابط الرئيسي (Master Google Drive Link):</label>
                    <input type="url" id="master-link" class="form-control" placeholder="https://drive.google.com/..." required>
                </div>
                <button type="submit" class="btn-primary"><i class="fa-solid fa-floppy-disk"></i> حفظ الرابط</button>
            </form>
        </div>

        <div class="admin-card">
            <h2><i class="fa-solid fa-link"></i> روابط أقسام البرامج (أعمال المتدربين)</h2>
            <form id="software-links-form">
                <div class="form-group">
                    <label for="input-link-sketchup">رابط Sketchup & Lumion:</label>
                    <input type="url" id="input-link-sketchup" class="form-control" placeholder="https://drive.google.com/...">
                </div>
                <div class="form-group">
                    <label for="input-link-3dsmax">رابط 3Ds Max & Corona:</label>
                    <input type="url" id="input-link-3dsmax" class="form-control" placeholder="https://drive.google.com/...">
                </div>
                <div class="form-group">
                    <label for="input-link-autocad">رابط Autocad:</label>
                    <input type="url" id="input-link-autocad" class="form-control" placeholder="https://drive.google.com/...">
                </div>
                <div class="form-group">
                    <label for="input-link-manual">رابط Manual Sketch:</label>
                    <input type="url" id="input-link-manual" class="form-control" placeholder="https://drive.google.com/...">
                </div>
                <div class="form-group">
                    <label for="input-link-landscape">رابط Real Time Landscape:</label>
                    <input type="url" id="input-link-landscape" class="form-control" placeholder="https://drive.google.com/...">
                </div>
                <button type="submit" class="btn-primary"><i class="fa-solid fa-floppy-disk"></i> حفظ الروابط</button>
            </form>
        </div>

        <div class="admin-card">
            <h2><i class="fa-solid fa-images"></i> إضافة مشروع جديد للـ Carousel</h2>
            <form id="add-project-form">
                <div class="form-group">
                    <label for="proj-image-file">1. ارفع صورة المشروع (من الجهاز):</label>
                    <input type="file" id="proj-image-file" class="form-control" accept="image/*">
                </div>
                <div style="text-align: center; margin: -10px 0 15px; color: var(--gold-light); font-weight: 700; font-size: 14px;">--- أو ---</div>
                <div class="form-group">
                    <label for="proj-image-url">2. رابط صورة المشروع (Image URL):</label>
                    <input type="url" id="proj-image-url" class="form-control" placeholder="https://example.com/image.jpg">
                </div>
                <div class="form-group">
                    <label for="proj-fb">رابط منشور الفيسبوك (Facebook Link):</label>
                    <input type="url" id="proj-fb" class="form-control" placeholder="https://facebook.com/..." required>
                </div>
                <div class="form-group">
                    <label for="proj-drive">رابط المشروع على Drive (Project Drive Link):</label>
                    <input type="url" id="proj-drive" class="form-control" placeholder="https://drive.google.com/..." required>
                </div>
                <button type="submit" id="add-project-btn" class="btn-primary"><i class="fa-solid fa-plus"></i> إضافة المشروع</button>
            </form>
        </div>

        <div class="admin-card">
            <h2><i class="fa-solid fa-list-check"></i> المشاريع المضافة</h2>
            <div style="overflow-x: auto;">
                <table id="projects-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>الصورة</th>
                            <th>رابط Drive</th>
                            <th>رابط Facebook</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="projects-body">
                        <!-- Dynamic Content -->
                    </tbody>
                </table>
                <div id="empty-state" class="empty-state" style="display: none;">لا توجد مشاريع مضافة حالياً.</div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6WKOXYGXHU41Jvb6RTfB6QF8k0nZLmJE",
            authDomain: "academy-portfolio.firebaseapp.com",
            projectId: "academy-portfolio",
            storageBucket: "academy-portfolio.firebasestorage.app",
            messagingSenderId: "46808319463",
            appId: "1:46808319463:web:d08849f36efc4a0f926942"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const auth = getAuth(app);

        // ── 1. AUTHENTICATION STATE OBSERVER ──
        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard-view');
        const logoutBtn = document.getElementById('logout-btn');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is logged in
                loginView.classList.add('hidden');
                dashboardView.classList.remove('hidden');
                logoutBtn.classList.remove('hidden');
                
                // Fetch data ONLY after confirming auth
                loadSettings();
                loadProjects();
            } else {
                // User is signed out
                loginView.classList.remove('hidden');
                dashboardView.classList.add('hidden');
                logoutBtn.classList.add('hidden');
            }
        });

        // ── 2. LOGIN LOGIC ──
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showToast('تم تسجيل الدخول بنجاح!');
                document.getElementById('login-form').reset();
            } catch (error) {
                console.error(error);
                showToast('خطأ: بيانات الدخول غير صحيحة!');
            }
        });

        // ── 3. LOGOUT LOGIC ──
        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
                showToast('تم تسجيل الخروج');
            } catch (error) {
                console.error('Error signing out: ', error);
            }
        });

        // ── 4. FIRESTORE LOGIC ──

        async function loadSettings() {
            const snap = await getDoc(doc(db, 'settings', 'links'));
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('master-link').value = data.master || '';
                
                const softwareLinks = data.software || {};
                document.getElementById('input-link-sketchup').value = softwareLinks.sketchup || '';
                document.getElementById('input-link-3dsmax').value = softwareLinks.max || '';
                document.getElementById('input-link-autocad').value = softwareLinks.autocad || '';
                document.getElementById('input-link-manual').value = softwareLinks.manual || '';
                document.getElementById('input-link-landscape').value = softwareLinks.landscape || '';
            }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        document.getElementById('master-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const val = document.getElementById('master-link').value;
            await setDoc(doc(db, 'settings', 'links'), { master: val }, { merge: true });
            showToast('تم حفظ الرابط الرئيسي بنجاح!');
        });

        document.getElementById('software-links-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const links = {
                sketchup: document.getElementById('input-link-sketchup').value,
                max: document.getElementById('input-link-3dsmax').value,
                autocad: document.getElementById('input-link-autocad').value,
                manual: document.getElementById('input-link-manual').value,
                landscape: document.getElementById('input-link-landscape').value,
            };
            await setDoc(doc(db, 'settings', 'links'), { software: links }, { merge: true });
            showToast('تم حفظ روابط الأقسام بنجاح!');
        });

        async function loadProjects() {
            const tbody = document.getElementById('projects-body');
            const emptyState = document.getElementById('empty-state');
            const table = document.getElementById('projects-table');
            
            tbody.innerHTML = '';
            
            const snap = await getDocs(collection(db, 'projects'));
            let projects = [];
            snap.forEach(d => projects.push({ id: d.id, ...d.data() }));

            if (projects.length === 0) {
                table.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            table.style.display = 'table';
            emptyState.style.display = 'none';

            projects.forEach((p, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td><img src="${p.image}" alt="مشروع" style="height: 45px; width: 70px; border-radius: 8px; object-fit: cover;"></td>
                    <td><a href="${p.drive}" target="_blank" style="color: var(--blue); text-decoration: none;"><i class="fa-brands fa-google-drive"></i> معاينة</a></td>
                    <td><a href="${p.facebook}" target="_blank" style="color: var(--blue); text-decoration: none;"><i class="fa-brands fa-facebook"></i> معاينة</a></td>
                    <td><button class="btn-danger" onclick="deleteProject('${p.id}')"><i class="fa-solid fa-trash"></i> حذف</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('add-project-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = document.getElementById('proj-image-file').files[0];
            const imageUrlInput = document.getElementById('proj-image-url').value;
            const facebook = document.getElementById('proj-fb').value;
            const drive = document.getElementById('proj-drive').value;
            const submitBtn = document.getElementById('add-project-btn');

            if (!file && !imageUrlInput) {
                showToast('الرجاء رفع صورة أو إدخال رابط للصورة أولاً.');
                return;
            }

            // Disable button and show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الحفظ...';

            try {
                let finalImageUrl = imageUrlInput;

                // If a file is selected, upload it and override the URL
                if (file) {
                    const storageRef = ref(storage, `project_images/${Date.now()}-${file.name}`);
                    const uploadResult = await uploadBytes(storageRef, file);
                    finalImageUrl = await getDownloadURL(uploadResult.ref);
                }

                // Add document to Firestore with the new image URL
                await addDoc(collection(db, 'projects'), { image: finalImageUrl, facebook, drive, createdAt: Date.now() });
                
                document.getElementById('add-project-form').reset();
                loadProjects();
                showToast('تم إضافة المشروع بنجاح!');
            } catch (error) {
                console.error("Error uploading image or saving project: ", error);
                showToast('حدث خطأ أثناء رفع الصورة.');
            } finally {
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-plus"></i> إضافة المشروع';
            }
        });

        window.deleteProject = async function(id) {
            if(confirm('هل أنت متأكد من حذف هذا المشروع؟')) {
                await deleteDoc(doc(db, 'projects', id));
                loadProjects();
                showToast('تم حذف المشروع!');
            }
        }
    </script>
</body>
</html>
